version: 2

updates:
  # ── Python dependencies ──────────────────────────────────────────────────
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    groups:
      # Bundle all LangChain packages into one PR
      langchain:
        patterns:
          - "langchain*"
      # Bundle all testing tools
      testing:
        patterns:
          - "pytest*"
          - "coverage*"
          - "codecov*"

  # ── GitHub Actions ───────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
