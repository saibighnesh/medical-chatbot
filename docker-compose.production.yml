version: '3.8'

services:
  # PostgreSQL Database (production-grade)
  postgres:
    image: postgres:15-alpine
    container_name: medbot-postgres
    environment:
      POSTGRES_DB: medbot
      POSTGRES_USER: medbot_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - medbot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medbot_user -d medbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: medbot-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - medbot-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # MedBot Application
  medbot:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: medbot-app
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://medbot_user:${POSTGRES_PASSWORD:-changeme}@postgres:5432/medbot
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./Data:/app/Data
      - ./faiss_index:/app/faiss_index
      - medbot-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - medbot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: medbot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
      - ./static:/var/www/static:ro  # Serve static files from nginx
    depends_on:
      - medbot
    restart: unless-stopped
    networks:
      - medbot-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  medbot-logs:
    driver: local
  nginx-logs:
    driver: local

networks:
  medbot-network:
    driver: bridge
