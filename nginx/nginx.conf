events {
    worker_connections 1024;
}

http {
    upstream medbot_app {
        server medbot:8080;
        keepalive 32;
    }

    # Rate limiting zone — applied to the chat endpoint at nginx level too
    limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=10r/s;
    limit_req_status 429;

    # ── Security headers applied to all responses ─────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"            always;
    add_header X-Content-Type-Options     "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    server {
        listen 80;
        server_name _;
        client_max_body_size 50M;

        # Redirect all HTTP → HTTPS in production.
        # Comment out this block if running without TLS.
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name _;
        client_max_body_size 50M;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # HSTS — browsers remember HTTPS for 1 year
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Static assets — served directly by nginx, not proxied
        location /static/ {
            alias /var/www/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # SSE streaming endpoint — must disable proxy buffering or tokens
        # accumulate in nginx's buffer and the client sees nothing until done.
        location /get {
            proxy_pass         http://medbot_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 120s;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Nginx-level rate limit (Flask-Limiter also applies)
            limit_req zone=chat_limit burst=5 nodelay;
        }

        # Health check — no rate limiting, no auth, fast path
        location /health {
            proxy_pass         http://medbot_app;
            proxy_http_version 1.1;
            access_log         off;
        }

        # All other routes
        location / {
            proxy_pass         http://medbot_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
