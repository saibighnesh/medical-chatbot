[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom marks — prevents PytestUnknownMarkWarning in CI
markers =
    integration: tests that require a live model/embedding download (deselect in fast CI)
    slow: tests with heavy computation or long waits (deselect in fast CI)
    unit: fast, fully-mocked unit tests

# Default options for every run
addopts =
    -v
    --tb=short
    --strict-markers
